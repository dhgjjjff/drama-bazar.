<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drama Bazar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .premium-glass { background: rgba(18, 18, 22, 0.55); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body class="bg-[#040406] text-white font-sans antialiased">

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Tumhaari live configuration details
        const firebaseConfig = {
            apiKey: "AIzaSyBtg0Np6be7dRKtXSumGM3oNCVvLZdtY38",
            authDomain: "dramabazar-5ffca.firebaseapp.com",
            projectId: "dramabazar-5ffca",
            storageBucket: "dramabazar-5ffca.appspot.com",
            messagingSenderId: "1025286281404",
            appId: "1:1025286281404:web:755d344fe8dc62301998b9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const { useState, useEffect } = React;
        const h = React.createElement;

        function UserApp() {
            const [currentNav, setCurrentNav] = useState('home'); 
            const [currentPage, setCurrentPage] = useState('main'); 
            const [allContent, setAllContent] = useState([]);
            const [selectedContent, setSelectedContent] = useState(null);
            const [showProfileMenu, setShowProfileMenu] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedSeason, setSelectedSeason] = useState('1'); 

            // Database se live data fetch karna
            useEffect(() => {
                const unsubscribe = onSnapshot(collection(db, "movies"), (querySnapshot) => {
                    const items = [];
                    querySnapshot.forEach((doc) => { items.push({ id: doc.id, ...doc.data() }); });
                    setAllContent(items);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (selectedContent) {
                    setSelectedSeason(selectedContent.season || '1');
                }
            }, [selectedContent]);

            useEffect(() => { if (window.lucide) { window.lucide.createIcons(); } }, [currentNav, currentPage, allContent, showProfileMenu, searchQuery, selectedSeason]);

            const getUniqueSeries = (data) => {
                const seen = new Set();
                return data.filter(item => {
                    if(!item.seriesId) return true;
                    const duplicate = seen.has(item.seriesId);
                    seen.add(item.seriesId);
                    return !duplicate;
                });
            };

            const filteredData = allContent.filter(item => 
                item.title && item.title.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const koreanDramas = getUniqueSeries(filteredData.filter(item => item.category === 'Korean Drama'));
            const trendingNow = getUniqueSeries(filteredData.filter(item => item.category === 'Trending'));
            const animeSeriesAll = getUniqueSeries(filteredData.filter(item => item.category === 'Anime Series'));
            const moviesList = getUniqueSeries(filteredData.filter(item => item.category === 'Movies'));
            const unofficialDramas = getUniqueSeries(filteredData.filter(item => item.category === 'Unofficial Drama'));

            const animeForYou = animeSeriesAll.slice(0, 4); 
            const animeNew = animeSeriesAll.filter(item => item.lang && item.lang.toLowerCase().includes('hindi')); 
            const animeMovies = getUniqueSeries(filteredData.filter(item => item.category === 'Anime Series' && item.title.toLowerCase().includes('movie'))); 

            const specialMovies = getUniqueSeries(filteredData.filter(item => item.category === 'Movies'));
            const specialUnofficial = getUniqueSeries(filteredData.filter(item => item.category === 'Unofficial Drama'));
            const specialShorts = getUniqueSeries(filteredData.filter(item => 
                (item.title && item.title.toLowerCase().includes('short')) || 
                (item.category && item.category.toLowerCase().includes('short'))
            ));

            const getAvailableSeasons = () => {
                if (!selectedContent) return [];
                const seasons = allContent
                    .filter(item => item.seriesId === selectedContent.seriesId)
                    .map(item => item.season || '1');
                return [...new Set(seasons)].sort((a, b) => a - b);
            };

            const isMovieMode = selectedContent && (selectedContent.category === 'Movies' || (selectedContent.title && selectedContent.title.toLowerCase().includes('movie')));

            return h('div', { class: 'min-h-screen pb-32 relative', onClick: () => setShowProfileMenu(false) },
                
                h('div', { class: 'fixed inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900/30 via-[#040406] to-[#040406] -z-10' }),

                // POPUP FULL VIDEO PLAYER
                currentPage === 'player' && selectedContent ? h('div', { class: 'fixed inset-0 bg-[#040406] z-[100] flex flex-col overflow-y-auto no-scrollbar', onClick: (e) => e.stopPropagation() },
                    h('div', { class: 'p-4 flex items-center gap-4 bg-black/60 sticky top-0 backdrop-blur-md z-10 border-b border-zinc-900' },
                        h('button', { onClick: () => setCurrentPage('main'), class: 'p-2 bg-zinc-900/80 rounded-full border border-zinc-800' }, h('i', { 'data-lucide': 'arrow-left', class: 'w-5 h-5' })),
                        h('div', null,
                            h('h2', { class: 'font-bold text-sm text-zinc-100' }, selectedContent.title),
                            h('p', { class: 'text-[10px] text-green-400 font-semibold' }, isMovieMode ? 'Full Movie Mode' : 'Season ' + selectedContent.season + ' | Episode ' + selectedContent.episode)
                        )
                    ),
                    h('div', { class: 'w-full aspect-video bg-black' },
                        h('div', { class: 'w-full h-full shadow-2xl', dangerouslySetInnerHTML: { __html: selectedContent.embed } })
                    ),
                    h('div', { class: 'p-6 flex-1' },
                        
                        isMovieMode ? h('div', { class: 'mt-8 flex flex-col items-center justify-center text-center p-8 border border-zinc-900 rounded-3xl premium-glass' },
                            h('i', { 'data-lucide': 'film', class: 'w-10 h-10 text-green-500 mb-3 drop-shadow-[0_0_10px_rgba(34,197,94,0.5)]' }),
                            h('h4', { class: 'text-sm font-bold text-zinc-200 mb-1' }, 'Movie Mode Active'),
                            h('p', { class: 'text-xs text-zinc-500 max-w-xs' }, 'You are watching a full-length feature movie. Sit back and enjoy the show!')
                        ) : h('div', null,
                            h('div', { class: 'mb-6 flex items-center justify-between' },
                                h('div', { class: 'flex items-center gap-2 text-xs font-black tracking-widest text-zinc-400 uppercase' },
                                    h('i', { 'data-lucide': 'clapperboard', class: 'w-4 h-4 text-green-500' }),
                                    'Select Season'
                                ),
                                h('div', { class: 'relative' },
                                    h('select', {
                                        value: selectedSeason,
                                        onChange: (e) => setSelectedSeason(e.target.value),
                                        class: 'bg-[#121215] border border-zinc-800 rounded-xl px-4 py-2 text-xs font-bold text-zinc-200 focus:outline-none focus:border-green-500 transition-colors cursor-pointer appearance-none pr-8'
                                    },
                                        getAvailableSeasons().map(season => 
                                            h('option', { key: season, value: season }, 'Season ' + season)
                                        )
                                    ),
                                    h('div', { class: 'absolute inset-y-0 right-3 flex items-center pointer-events-none text-zinc-500' },
                                        h('i', { 'data-lucide': 'chevron-down', class: 'w-3 h-3' })
                                    )
                                )
                            ),

                            h('h3', { class: 'text-xs font-black tracking-widest text-zinc-500 uppercase mb-4 flex items-center gap-2' }, h('i', { 'data-lucide': 'layers', class: 'w-4 h-4 text-green-500' }), 'Select Episode'),
                            h('div', { class: 'grid grid-cols-4 gap-3' }, 
                                allContent.filter(item => item.seriesId === selectedContent.seriesId && String(item.season || '1') === String(selectedSeason))
                                .sort((a, b) => a.episode - b.episode)
                                .map(ep => h('button', { 
                                    key: ep.id,
                                    onClick: () => setSelectedContent(ep),
                                    class: 'py-3.5 rounded-xl font-bold text-xs transition-all ' + (ep.id === selectedContent.id ? 'bg-gradient-to-r from-green-500 to-emerald-600 text-black shadow-lg shadow-green-500/30 scale-[1.02]' : 'bg-[#121215] text-zinc-400 border border-zinc-800/80 hover:bg-zinc-800/40')
                                }, 'Ep ' + ep.episode))
                            )
                        )
                    )
                ) : null,

                // HEADER SECTION
                currentPage === 'main' ? h('div', null,
                    h('header', { class: 'p-5 flex justify-between items-center sticky top-0 backdrop-blur-md bg-[#040406]/60 z-40' },
                        h('h1', { 
                            class: 'text-2xl font-black italic text-green-500 tracking-tighter drop-shadow-[0_0_15px_rgba(34,197,94,0.7)]' 
                        }, 'DRAMA BAZAR'),
                        h('div', { class: 'relative' },
                            h('div', { 
                                onClick: (e) => { e.stopPropagation(); setShowProfileMenu(!showProfileMenu); },
                                class: 'w-9 h-9 rounded-full bg-zinc-800 overflow-hidden border border-zinc-700 cursor-pointer shadow-lg active:scale-95 transition-all flex items-center justify-center' 
                            }, 
                                h('img', { src: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix' })
                            ),
                            showProfileMenu ? h('div', { class: 'absolute right-0 mt-3 w-56 premium-glass rounded-2xl p-2 shadow-2xl border border-zinc-800/50 z-50' },
                                h('a', { href: '#', class: 'flex items-center gap-3 p-3 text-xs font-semibold text-zinc-300 hover:bg-zinc-800/50 rounded-xl transition-all' }, h('i', { 'data-lucide': 'heart', class: 'w-4 h-4 text-red-500' }), 'My Fav Drama'),
                                h('a', { href: '#', class: 'flex items-center gap-3 p-3 text-xs font-semibold text-zinc-300 hover:bg-zinc-800/50 rounded-xl transition-all' }, h('i', { 'data-lucide': 'history', class: 'w-4 h-4 text-blue-400' }), 'History'),
                                h('a', { href: 'mailto:support@dramabazar.com', class: 'flex items-center gap-3 p-3 text-xs font-semibold text-zinc-300 hover:bg-zinc-800/50 rounded-xl transition-all' }, h('i', { 'data-lucide': 'mail', class: 'w-4 h-4 text-yellow-500' }), 'Feedback Email'),
                                h('div', { class: 'h-[1px] bg-zinc-800/60 my-1' }),
                                h('a', { href: 'https://wa.me/919999999999', target: '_blank', class: 'flex items-center gap-3 p-3 text-xs font-bold text-green-400 hover:bg-green-500/10 rounded-xl transition-all' }, h('i', { 'data-lucide': 'message-circle', class: 'w-4 h-4 text-green-400' }), 'Talk to me with WhatsApp')
                            ) : null
                        )
                    ),
                    
                    // SEARCH BOX
                    h('div', { class: 'px-5 py-2' },
                        h('div', { class: 'relative premium-glass rounded-2xl flex items-center px-4 py-3.5 border border-zinc-800/60 shadow-inner' },
                            h('i', { 'data-lucide': 'search', class: 'text-zinc-500 mr-3 w-4 h-4' }),
                            h('input', { 
                                type: 'text', 
                                placeholder: 'Search drama, anime, movies...', 
                                value: searchQuery,
                                onChange: (e) => setSearchQuery(e.target.value), 
                                class: 'bg-transparent border-none outline-none w-full text-sm text-white placeholder-zinc-600' 
                            }),
                            searchQuery ? h('button', { onClick: () => setSearchQuery(''), class: 'text-zinc-500 hover:text-white ml-2 transition-colors' }, h('i', { 'data-lucide': 'x', class: 'w-4 h-4' })) : null
                        )
                    ),

                    // ================= PAGE 1: HOME PAGE =================
                    currentNav === 'home' ? h('div', null,
                        koreanDramas.length > 0 && h('div', { class: 'mt-6 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-zinc-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'tv', class: 'text-blue-500 w-3.5 h-3.5' }), 'Korean Drama'),
                            h('div', { class: 'flex gap-4 overflow-x-auto no-scrollbar py-1' },
                                koreanDramas.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'min-w-[170px] max-w-[170px] cursor-pointer group' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-900 group-hover:border-green-500/80 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' }),
                                        h('div', { class: 'absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent' })
                                    ),
                                    h('p', { class: 'mt-2.5 text-xs font-semibold truncate text-zinc-300 group-hover:text-white transition-colors' }, item.title)
                                ))
                            )
                        ),
                        trendingNow.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-zinc-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'flame', class: 'text-orange-500 w-3.5 h-3.5' }), 'Trending Now'),
                            h('div', { class: 'grid grid-cols-2 gap-4' },
                                trendingNow.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'relative cursor-pointer group mb-2' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-900 group-hover:border-green-500/80 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' }),
                                        h('div', { class: 'absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent' }),
                                        h('div', { class: 'absolute top-2 left-2 bg-black/80 backdrop-blur-md text-[9px] px-2 py-0.5 rounded-lg border border-zinc-800 text-zinc-200 font-bold tracking-wide' }, item.lang)
                                    ),
                                    h('p', { class: 'mt-2.5 text-xs font-bold truncate text-zinc-300 group-hover:text-white transition-colors' }, item.title)
                                ))
                            )
                        ),
                        animeSeriesAll.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-zinc-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'clapperboard', class: 'text-purple-500 w-3.5 h-3.5' }), 'Anime Series'),
                            h('div', { class: 'flex gap-4 overflow-x-auto no-scrollbar py-1' },
                                animeSeriesAll.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'min-w-[170px] max-w-[170px] cursor-pointer group' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-900 group-hover:border-green-500/80 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' }),
                                        h('div', { class: 'absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent' })
                                    ),
                                    h('p', { class: 'mt-2.5 text-xs font-semibold truncate text-zinc-300 group-hover:text-white transition-colors' }, item.title)
                                ))
                            )
                        ),
                        moviesList.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-zinc-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'film', class: 'text-cyan-500 w-3.5 h-3.5' }), 'Movies'),
                            h('div', { class: 'grid grid-cols-2 gap-4' },
                                moviesList.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'relative cursor-pointer group mb-2' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-900 group-hover:border-green-500/80 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' }),
                                        h('div', { class: 'absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent' })
                                    ),
                                    h('p', { class: 'mt-2.5 text-xs font-bold truncate text-zinc-300 group-hover:text-white transition-colors' }, item.title)
                                ))
                            )
                        ),
                        unofficialDramas.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-zinc-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'monitor-play', class: 'text-pink-500 w-3.5 h-3.5' }), 'Unofficial Drama'),
                            h('div', { class: 'flex gap-4 overflow-x-auto no-scrollbar py-1' },
                                unofficialDramas.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'min-w-[170px] max-w-[170px] cursor-pointer group' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-900 group-hover:border-green-500/80 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' }),
                                        h('div', { class: 'absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent' })
                                    ),
                                    h('p', { class: 'mt-2.5 text-xs font-semibold truncate text-zinc-300 group-hover:text-white transition-colors' }, item.title)
                                ))
                            )
                        ),
                        filteredData.length === 0 && h('div', { class: 'text-center py-20 text-zinc-600 text-xs font-medium' }, 'No content found matching "' + searchQuery + '"')
                    ) : null,

                    // ================= PAGE 2: ANIME SERIES PAGE =================
                    currentNav === 'anime' ? h('div', null,
                        animeForYou.length > 0 && h('div', { class: 'mt-6 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-purple-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'sparkles', class: 'w-3.5 h-3.5' }), 'For You (Anime)'),
                            h('div', { class: 'flex gap-4 overflow-x-auto no-scrollbar py-1' },
                                animeForYou.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'min-w-[170px] max-w-[170px] cursor-pointer group' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-950 group-hover:border-purple-500 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' })
                                    ),
                                    h('p', { class: 'mt-2 text-xs font-semibold truncate text-zinc-300 group-hover:text-white' }, item.title)
                                ))
                            )
                        ),
                        animeNew.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-purple-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'clock', class: 'w-3.5 h-3.5' }), 'New Anime (Hindi)'),
                            h('div', { class: 'grid grid-cols-2 gap-4' },
                                animeNew.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'relative cursor-pointer group mb-1' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-950 group-hover:border-purple-500 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' })
                                    ),
                                    h('p', { class: 'mt-2 text-xs font-bold truncate text-zinc-300 group-hover:text-white' }, item.title)
                                ))
                            )
                        ),
                        animeMovies.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-purple-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'film', class: 'w-3.5 h-3.5' }), 'Anime Movie'),
                            h('div', { class: 'flex gap-4 overflow-x-auto no-scrollbar py-1' },
                                animeMovies.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'min-w-[170px] max-w-[170px] cursor-pointer group' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-950 group-hover:border-purple-500 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' })
                                    ),
                                    h('p', { class: 'mt-2 text-xs font-semibold truncate text-zinc-300 group-hover:text-white' }, item.title)
                                ))
                            )

                        filteredData.filter(item => item.category === 'Anime Series').length === 0 && h('div', { class: 'text-center py-20 text-zinc-600 text-xs' }, 'No Anime found.')
                    ) : null,

                    // ================= PAGE 3: KDRAMA PAGE =================
                    currentNav === 'kdrama' ? h('div', null,
                        koreanDramas.length > 0 && h('div', { class: 'mt-6 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-blue-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'tv-2', class: 'w-3.5 h-3.5' }), 'Korean Dramas'),
                            h('div', { class: 'grid grid-cols-2 gap-4' },
                                koreanDramas.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'relative cursor-pointer group mb-1' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-950 group-hover:border-blue-500 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' })
                                    ),
                                    h('p', { class: 'mt-2 text-xs font-bold truncate text-zinc-300 group-hover:text-white' }, item.title)
                                ))
                            )
                        ),
                        moviesList.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-blue-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'clapperboard', class: 'w-3.5 h-3.5' }), 'Movies Corner'),
                            h('div', { class: 'flex gap-4 overflow-x-auto no-scrollbar py-1' },
                                moviesList.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'min-w-[170px] max-w-[170px] cursor-pointer group' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-950 group-hover:border-blue-500 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' })
                                    ),
                                    h('p', { class: 'mt-2 text-xs font-semibold truncate text-zinc-300 group-hover:text-white' }, item.title)
                                ))
                            )
                        ),
                        koreanDramas.length === 0 && moviesList.length === 0 && h('div', { class: 'text-center py-20 text-zinc-600 text-xs' }, 'No matching Drama or Movies found.')
                    ) : null,

                    // ================= PAGE 4: SPICIAL DRAMA PAGE =================
                    currentNav === 'special' ? h('div', null,
                        specialMovies.length > 0 && h('div', { class: 'mt-6 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-pink-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'film', class: 'w-3.5 h-3.5' }), 'Movies Corner'),
                            h('div', { class: 'flex gap-4 overflow-x-auto no-scrollbar py-1' },
                                specialMovies.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'min-w-[170px] max-w-[170px] cursor-pointer group' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-950 group-hover:border-pink-500 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' })
                                    ),
                                    h('p', { class: 'mt-2 text-xs font-semibold truncate text-zinc-300 group-hover:text-white' }, item.title)
                                ))
                            )
                        ),
                        specialUnofficial.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-pink-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'monitor-play', class: 'w-3.5 h-3.5' }), 'Unofficial Drama'),
                            h('div', { class: 'grid grid-cols-2 gap-4' },
                                specialUnofficial.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'relative cursor-pointer group mb-1' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-950 group-hover:border-pink-500 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' })
                                    ),
                                    h('p', { class: 'mt-2 text-xs font-bold truncate text-zinc-300 group-hover:text-white' }, item.title)
                                ))
                            )
                        ),
                        specialShorts.length > 0 && h('div', { class: 'mt-8 px-5' },
                            h('h2', { class: 'text-xs font-black mb-4 uppercase tracking-widest text-pink-400 flex items-center gap-2' }, h('i', { 'data-lucide': 'zap', class: 'w-3.5 h-3.5' }), 'Shorts Story'),
                            h('div', { class: 'flex gap-4 overflow-x-auto no-scrollbar py-1' },
                                specialShorts.map(item => h('div', { key: item.id, onClick: () => { setSelectedContent(item); setCurrentPage('player'); }, class: 'min-w-[170px] max-w-[170px] cursor-pointer group' },
                                    h('div', { class: 'relative rounded-2xl overflow-hidden border border-zinc-950 group-hover:border-pink-500 transition-all card-shadow bg-zinc-900 aspect-video' },
                                        h('img', { src: item.img, class: 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300' })
                                    ),
                                    h('p', { class: 'mt-2 text-xs font-semibold truncate text-zinc-300 group-hover:text-white' }, item.title)
                                ))
                            )
                        ),
                        specialMovies.length === 0 && specialUnofficial.length === 0 && specialShorts.length === 0 && h('div', { class: 'text-center py-20 text-zinc-600 text-xs' }, 'No special data found.')
                    ) : null
                ) : null,

                h('footer', { class: 'fixed bottom-5 left-5 right-5 premium-glass rounded-2xl px-4 py-3.5 flex justify-between items-center z-50 shadow-2xl border border-zinc-800/40' },
                    h('button', { 
                        onClick: () => { setCurrentNav('home'); setCurrentPage('main'); setSearchQuery(''); },
                        class: 'flex flex-col items-center gap-1 cursor-pointer flex-1 transition-all ' + (currentNav === 'home' ? 'text-green-500 scale-105 font-bold' : 'text-zinc-500')
                    }, h('i', { 'data-lucide': 'home', class: 'w-5 h-5' }), h('span', { class: 'text-[9px] tracking-wide' }, 'Home')),
                    
                    h('button', { 
                        onClick: () => { setCurrentNav('anime'); setCurrentPage('main'); setSearchQuery(''); },
                        class: 'flex flex-col items-center gap-1 cursor-pointer flex-1 transition-all ' + (currentNav === 'anime' ? 'text-purple-400 scale-105 font-bold' : 'text-zinc-500')
                    }, h('i', { 'data-lucide': 'sparkles', class: 'w-5 h-5' }), h('span', { class: 'text-[9px] tracking-wide' }, 'Anime')),
                    
                    h('button', { 
                        onClick: () => { setCurrentNav('kdrama'); setCurrentPage('main'); setSearchQuery(''); },
                        class: 'flex flex-col items-center gap-1 cursor-pointer flex-1 transition-all ' + (currentNav === 'kdrama' ? 'text-blue-400 scale-105 font-bold' : 'text-zinc-500')
                    }, h('i', { 'data-lucide': 'tv-2', class: 'w-5 h-5' }), h('span', { class: 'text-[9px] tracking-wide' }, 'Kdrama')),
                    
                    h('button', { 
                        onClick: () => { setCurrentNav('special'); setCurrentPage('main'); setSearchQuery(''); },
                        class: 'flex flex-col items-center gap-1 cursor-pointer flex-1 transition-all ' + (currentNav === 'special' ? 'text-pink-400 scale-105 font-bold' : 'text-zinc-500')
                    }, h('i', { 'data-lucide': 'award', class: 'w-5 h-5' }), h('span', { class: 'text-[9px] tracking-wide' }, 'Spicial'))
                )
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(UserApp));
    </script>
</body>
</html>
